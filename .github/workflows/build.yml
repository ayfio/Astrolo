name: 🪟 Build Astrolo.Explorer (.NET Framework 4.8)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      # ✅ Checkout с полной историей для GitVersion
      - name: 📥 Checkout with full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 🔑 Ключевая настройка!

      # 🔹 Игнорируем global.json, если он требует несуществующий SDK
      - name: 🗑️ Remove global.json (if exists)
        run: |
          if (Test-Path "global.json") {
            Remove-Item "global.json" -Force
            Write-Host "🗑️ Removed global.json to avoid SDK version conflict"
          }

      # 🔹 Setup .NET SDK 8 (может собирать net48 проекты)
      - name: ⚙️ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 🔹 Restore NuGet пакетов
      - name: 📦 Restore
        run: dotnet restore source/Astrolo.Explorer/Astrolo.Explorer.csproj

      # 🔹 Сборка (GitVersion сработает благодаря fetch-depth: 0)
      - name: 🔨 Build
        run: dotnet build source/Astrolo.Explorer/Astrolo.Explorer.csproj --configuration Release --no-restore

      # 🔹 Публикация
      - name: 📤 Publish
        run: |
          dotnet publish source/Astrolo.Explorer/Astrolo.Explorer.csproj `
            --configuration Release `
            -p:DeployOnBuild=true `
            -p:PublishProfile=FolderProfile `
            -o publish/Astrolo

      # 🔹 Fallback: копирование, если publish не сработал
      - name: 📦 Copy build output (fallback)
        if: hashFiles('publish/Astrolo/*.exe') == ''
        run: |
          $src = "source/Astrolo.Explorer/bin/Release/net48-windows"
          $dst = "publish/Astrolo"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item "$src\*" -Destination $dst -Recurse -Force
          }

      # 🔹 Загрузка артефакта
      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astrolo-Explorer-net48
          path: publish/Astrolo/
          retention-days: 30
          if-no-files-found: error
