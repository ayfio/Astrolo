name: 🪟 CI Build & Publish (Astrolo)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🗑️ Remove global.json (if exists)
        run: |
          if (Test-Path "global.json") {
            Remove-Item "global.json" -Force
          }

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 📦 Restore
        run: dotnet restore source/Astrolo.Explorer/Astrolo.Explorer.csproj

      # 🔹 Build с одним потоком для избежания конфликтов GitVersion
      - name: 🔨 Build
        run: dotnet build source/Astrolo.Explorer/Astrolo.Explorer.csproj `
          --configuration Release `
          --no-restore `
          /m:1

      - name: 🧪 Test
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

      # 🔹 Publish с отключением GitVersion
      - name: 📤 Publish
        run: |
          dotnet publish source/Astrolo.Explorer/Astrolo.Explorer.csproj `
            --configuration Release `
            -p:DeployOnBuild=true `
            -p:PublishProfile=FolderProfile `
            -p:GitVersion_CalculateVersion=false `
            -o publish/Astrolo

      - name: 📦 Copy build output (fallback)
        if: hashFiles('publish/Astrolo/*.exe') == ''
        run: |
          $src = "source/Astrolo.Explorer/bin/Release/net48-windows"
          $dst = "publish/Astrolo"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item "$src\*" -Destination $dst -Recurse -Force
          }

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astrolo-Explorer-net48
          path: publish/Astrolo/
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Build Summary
        run: |
          Write-Host "`n🎉 Build completed!"
          Get-ChildItem -Path publish/Astrolo -File -ErrorAction SilentlyContinue | 
            ForEach-Object { Write-Host "  - $($_.Name)" }
