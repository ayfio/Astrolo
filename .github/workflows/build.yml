name: 🪟 Build Astrolo.Explorer (.NET Framework 4.8)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      # ✅ Checkout с полной историей для GitVersion
      - name: 📥 Checkout with full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 🔹 Убираем global.json если он блокирует сборку
      - name: 🗑️ Remove global.json (if exists)
        run: |
          if (Test-Path "global.json") {
            Remove-Item "global.json" -Force
            Write-Host "🗑️ Removed global.json"
          }

      # 🔹 Setup .NET SDK 8
      - name: ⚙️ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 🔹 Restore — ПРАВИЛЬНЫЙ ПУТЬ ✅
      - name: 📦 Restore
        run: dotnet restore source/Astrolo.Explorer/Astrolo.Explorer.csproj

      # 🔹 Build — ПРАВИЛЬНЫЙ ПУТЬ ✅
      - name: 🔨 Build
        run: dotnet build source/Astrolo.Explorer/Astrolo.Explorer.csproj --configuration Release --no-restore

      # 🔹 Publish — ПРАВИЛЬНЫЙ ПУТЬ ✅
      - name: 📤 Publish
        run: |
          dotnet publish source/Astrolo.Explorer/Astrolo.Explorer.csproj `
            --configuration Release `
            -p:DeployOnBuild=true `
            -p:PublishProfile=FolderProfile `
            -o publish/Astrolo

      # 🔹 Fallback: копирование из bin
      - name: 📦 Copy build output (fallback)
        if: hashFiles('publish/Astrolo/*.exe') == ''
        run: |
          $src = "source/Astrolo.Explorer/bin/Release/net48-windows"
          $dst = "publish/Astrolo"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item "$src\*" -Destination $dst -Recurse -Force
            Write-Host "✅ Copied from $src"
          }

      # 🔹 Загрузка артефакта
      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astrolo-Explorer-net48
          path: publish/Astrolo/
          retention-days: 30
          if-no-files-found: error

      # 🔹 Информация
      - name: 📋 Build Summary
        run: |
          Write-Host "`n✅ Build completed!"
          Get-ChildItem -Path publish/Astrolo -File -ErrorAction SilentlyContinue | 
            ForEach-Object { Write-Host "  - $($_.Name)" }
