name: 🪟 Build Astrolo.Explorer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      # ✅ Обновлённая версия checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      # ✅ Обновлённая версия setup-msbuild
      - name: ⚙️ Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      # Восстановление пакетов
      - name: 📦 Restore packages
        run: nuget restore source/Astrolo.sln
        continue-on-error: true

      # Сборка проекта
      - name: 🔨 Build Astrolo.Explorer
        run: |
          msbuild source/Astrolo.Explorer/Astrolo.Explorer.csproj `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /t:Rebuild

      # Загрузка артефакта
      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4  # ← Эта версия уже совместима
        with:
          name: Astrolo-Explorer-Build
          path: source/Astrolo.Explorer/bin/Release/net48-windows/
          retention-days: 30
          if-no-files-found: error

      # Информация о сборке
      - name: 📋 Show build info
        run: |
          Write-Host "`n✅ Build completed successfully!"
          Write-Host "📁 Files created:"
          Get-ChildItem -Path "source/Astrolo.Explorer/bin/Release/net48-windows" -File | 
            ForEach-Object { Write-Host "  - $($_.Name)" }
