name: 🪟 CI Build & Publish (Astrolo)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Ручной запуск из вкладки Actions

jobs:
  build-and-publish:
    runs-on: windows-2022 # ✅ WPF требует Windows
    timeout-minutes: 15

    steps:
      # 1. Загрузка кода с полной историей для GitVersion
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 🔑 Нужно для GitVersion

      # 2. Убираем global.json если он требует несуществующий SDK
      - name: 🗑️ Remove global.json (if exists)
        run: |
          if (Test-Path "global.json") {
            Remove-Item "global.json" -Force
            Write-Host "🗑️ Removed global.json to avoid SDK conflict"
          }

      # 3. Установка .NET SDK 8 (может собирать net48 проекты)
      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 4. Восстановление NuGet-пакетов — ✅ ПРАВИЛЬНЫЙ ПУТЬ
      - name: 📦 Restore
        run: dotnet restore source/Astrolo.Explorer/Astrolo.Explorer.csproj

      # 5. Сборка — ✅ С отключением GitVersion и одним потоком
      - name: 🔨 Build
        run: dotnet build source/Astrolo.Explorer/Astrolo.Explorer.csproj `
          --configuration Release `
          --no-restore `
          -p:GitVersion_CalculateVersion=false `
          /m:1

      # 6. Тесты (если есть)
      - name: 🧪 Test
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

      # 7. Публикация — ✅ С отключением интеграции GitVersion+GitHub Actions
      - name: 📤 Publish
        run: |
          dotnet publish source/Astrolo.Explorer/Astrolo.Explorer.csproj `
            --configuration Release `
            --no-build `
            -p:PublishProfile=FolderProfile `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o publish/Astrolo
        env:
          GitVersion_DisableGitHubActions: true  # 🔑 Отключает запись в GITHUB_ENV

      # 8. Fallback: копирование из bin, если publish не сработал
      - name: 📦 Copy build output (fallback)
        if: hashFiles('publish/Astrolo/*.exe') == ''
        run: |
          $src = "source/Astrolo.Explorer/bin/Release/net48-windows"
          $dst = "publish/Astrolo"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item "$src\*" -Destination $dst -Recurse -Force
            Write-Host "✅ Copied from $src to $dst"
          }

      # 9. Загрузка артефакта
      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astrolo-Explorer-net48
          path: publish/Astrolo/
          retention-days: 30
          if-no-files-found: error

      # 10. Логирование результата
      - name: 📋 Build Summary
        run: |
          Write-Host "`n🎉 Build completed!"
          Write-Host "📁 Published files:"
          Get-ChildItem -Path publish/Astrolo -File -ErrorAction SilentlyContinue | 
            ForEach-Object { Write-Host "  - $($_.Name) ($([math]::Round($_.Length/1KB,1)) KB)" }
